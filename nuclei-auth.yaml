# Headers sent with every request
header:
  - "X-HackerOne-Research: sengtocxoen"
  # --- api.consumer.worldcoin.org authenticated testing ---
  # After completing the Ethereum challenge-response auth flow, paste the
  # accessToken below and uncomment:
  #
  #   Auth flow (from scan_config.yaml test_credentials):
  #     1. POST /v1/graphql  →  requestChallengeV2(eoaAddress)  →  challenge
  #     2. Sign challenge with private key via ethers.js wallet.signMessage()
  #     3. POST /v1/graphql  →  solveChallengeV2(challenge, signature)  →  accessToken
  #
  # - "x-authorization: YOUR_ACCESS_TOKEN_HERE"
